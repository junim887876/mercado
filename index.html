<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VIP</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-primary: #f2f2f2;
            --text-secondary: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--text-primary);
            display: flex; justify-content: center; padding: 20px; min-height: 100vh;
        }

        .container {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 30px; width: 100%; max-width: 450px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 600; font-size: 24px; margin-bottom: 24px; text-align: center; letter-spacing: -0.5px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .input-group input[type="text"] {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2); color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-group input[type="text"]:focus { border-color: var(--accent); }

        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-bottom: 1px solid var(--glass-border);
        }
        .item-info h4 { font-size: 16px; font-weight: 500; }
        .item-info p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        .counter { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 4px 8px; }
        .counter button {
            background: none; border: none; color: white; font-size: 20px; width: 28px; height: 28px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .counter button:active { opacity: 0.5; }
        .counter input { width: 30px; text-align: center; background: none; border: none; color: white; font-size: 16px; font-weight: 600; pointer-events: none; }

        .total-section {
            margin-top: 30px; display: flex; justify-content: space-between; align-items: center;
            font-size: 20px; font-weight: 600;
        }

        .btn-submit {
            width: 100%; padding: 16px; margin-top: 24px; border: none; border-radius: 14px;
            background: var(--accent); color: black; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h2>Faça seu Pedido</h2>

    <!-- Substitua "SEU_LINK_DO_GOOGLE_FORMS" pela URL de resposta do seu formulário -->
    <form action="SEU_LINK_DO_GOOGLE_FORMS" method="POST" id="orderForm">
        
        <div class="input-group">
            <label>Endereço de Entrega</label>
            <!-- Substitua "entry.111111" pelo name do input gerado no seu Google Forms -->
            <input type="text" name="entry.111111" placeholder="Rua, Número, Bairro" required>
        </div>

        <div class="input-group">
            <label>ID do Cartão Black</label>
            <!-- Substitua "entry.222222" pelo name do input correspondente no Forms -->
            <input type="text" name="entry.222222" placeholder="Ex: BLK-9999" required>
        </div>

        <div id="menu-items">
            <!-- Os itens serão gerados via JavaScript -->
        </div>

        <div class="total-section">
            <span>Total</span>
            <span id="totalValue">R$ 0,00</span>
        </div>

        <button type="submit" class="btn-submit">Finalizar Pedido</button>
    </form>
</div>

<script>
    const produtos = [
        { id: 'entry.333333', name: 'Antártica', price: 4.00 },
        { id: 'entry.444444', name: 'Brahma', price: 4.00 },
        { id: 'entry.555555', name: 'Coca-Cola', price: 4.00 },
        { id: 'entry.666666', name: 'Guaraná Antártica', price: 4.00 },
        { id: 'entry.777777', name: 'Picolé', price: 3.00 },
        { id: 'entry.888888', name: 'Suco', price: 2.50 },
        { id: 'entry.999999', name: 'Toddynho', price: 2.00 },
        { id: 'entry.000000', name: 'Pomada Modeladora', price: 35.00 } // Ajuste o valor da pomada
    ];

    const menuContainer = document.getElementById('menu-items');
    const totalElement = document.getElementById('totalValue');

    produtos.forEach((produto, index) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        itemDiv.innerHTML = `
            <div class="item-info">
                <h4>${produto.name}</h4>
                <p>R$ ${produto.price.toFixed(2).replace('.', ',')}</p>
            </div>
            <div class="counter">
                <button type="button" onclick="updateQty(${index}, -1)">-</button>
                <input type="number" name="${produto.id}" id="qty-${index}" value="0" readonly>
                <button type="button" onclick="updateQty(${index}, 1)">+</button>
            </div>
        `;
        menuContainer.appendChild(itemDiv);
    });

    function updateQty(index, change) {
        const input = document.getElementById(`qty-${index}`);
        let currentQty = parseInt(input.value);
        let newQty = currentQty + change;
        
        if (newQty >= 0) {
            input.value = newQty;
            calculateTotal();
        }
    }

    function calculateTotal() {
        let total = 0;
        produtos.forEach((produto, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value);
            total += qty * produto.price;
        });
        totalElement.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }
</script>

</body>
</html>
